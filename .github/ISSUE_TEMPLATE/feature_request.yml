name: Feature request
description: Suggest a new feature or improvement for PageLens.
title: '[Feature] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. PageLens is deliberately focused, so the clearer the problem you're trying to solve, the easier it is to evaluate. "Not right now" is a normal answer — it's not a judgement of the idea.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation or pain point. Skip mentioning a solution here.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Your proposed solution (optional)

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered (optional)
      description: Other approaches, including "do nothing" or current workarounds.

  - type: checkboxes
    id: alignment
    attributes:
      label: Alignment checks
      description: These keep requests inside the PageLens DNA (free, private, focused).
      options:
        - label: This keeps PageLens free — no accounts, subscriptions, or ads
          required: true
        - label: This adds no tracking and sends no data off-device beyond the existing green-hosting check
          required: true
        - label: I searched existing issues and didn't find a duplicate
          required: true
